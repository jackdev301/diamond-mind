name: Daily Pregame Ingestion

on:
  schedule:
    # 10:00 AM ET = 14:00 UTC (adjusts naturally with EST/EDT)
    - cron: "0 14 * * *"
  workflow_dispatch:
    inputs:
      game_date:
        description: "Date to run ingestion for (YYYY-MM-DD). Defaults to today."
        required: false
        default: ""

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Determine game date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.game_date }}" ]; then
            echo "game_date=${{ github.event.inputs.game_date }}" >> $GITHUB_OUTPUT
          else
            echo "game_date=$(TZ=America/New_York date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          fi

      - name: Deploy latest code to Render
        # continue-on-error so a missing/broken deploy hook never blocks ingestion
        continue-on-error: true
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            echo "RENDER_DEPLOY_HOOK secret not set — skipping deploy trigger."
            exit 0
          fi
          echo "Triggering Render deploy…"
          RESPONSE=$(curl -s "${{ secrets.RENDER_DEPLOY_HOOK }}")
          DEPLOY_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['deploy']['id'])" 2>/dev/null || echo "unknown")
          echo "Deploy ID: $DEPLOY_ID"
          echo "Waiting 3 minutes for Render to finish deploying…"
          sleep 180

      - name: Wake up Render and wait until healthy
        run: |
          set +e
          echo "Pinging Render health endpoint…"
          for i in $(seq 1 16); do
            status=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 90 \
              https://diamond-mind-api.onrender.com/health 2>/dev/null)
            echo "  Attempt $i/16: HTTP ${status:-<timeout>}"
            if [ "$status" = "200" ]; then
              echo "Server is up."
              exit 0
            fi
            sleep 15
          done
          echo "Server still not responding after 4 minutes — continuing anyway."

      - name: Trigger ingestion
        id: trigger
        run: |
          GAME_DATE="${{ steps.date.outputs.game_date }}"
          echo "Triggering ingestion for $GAME_DATE…"

          RESPONSE=$(curl -s -X POST \
            --max-time 30 \
            -H "X-Admin-Token: ${{ secrets.ADMIN_TOKEN }}" \
            "https://diamond-mind-api.onrender.com/admin/run-ingestion?game_date=${GAME_DATE}")

          echo "Response: $RESPONSE"

          JOB_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('job_id',''))")
          STATUS=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))")

          if [ -z "$JOB_ID" ]; then
            echo "Failed to get job_id from response."
            exit 1
          fi

          echo "job_id=$JOB_ID" >> $GITHUB_OUTPUT
          echo "Ingestion job $JOB_ID started (status: $STATUS)"

      - name: Poll until ingestion completes
        run: |
          JOB_ID="${{ steps.trigger.outputs.job_id }}"
          echo "Polling job $JOB_ID…"

          LAST_LINES=0
          for i in $(seq 1 100); do
            sleep 60

            RESPONSE=$(curl -s --max-time 30 \
              "https://diamond-mind-api.onrender.com/admin/ingestion-status/${JOB_ID}?tail=10")

            STATUS=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status',''))")
            TOTAL=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('log_lines_total',0))")
            LAST_LOG=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); lines=d.get('log_tail',[]); print(lines[-1] if lines else '')")
            ERROR=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('error') or '')")

            echo "  [$i/80] status=$STATUS  log_lines=$TOTAL  last: $LAST_LOG"

            if [ "$STATUS" = "done" ]; then
              echo "Ingestion completed successfully."
              exit 0
            fi

            if [ "$STATUS" = "error" ]; then
              echo "Ingestion failed: $ERROR"
              exit 1
            fi
          done

          echo "Timed out waiting for ingestion to complete (100 min)."
          exit 1
